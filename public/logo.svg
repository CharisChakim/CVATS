<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Badge background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="40" height="20" rx="10" fill="url(#shine)"/>
  <!-- CV bold text -->
  <text x="4.5" y="27" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="20" fill="white">CV</text>
  <!-- ATS checkmark badge -->
  <circle cx="32" cy="10" r="7" fill="#22c55e"/>
  <path d="M28.5 10 L31.5 13 L35.5 7.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
